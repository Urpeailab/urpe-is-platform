		<!-- Suppress ResizeObserver errors -->
		<script>
			// Suppress ResizeObserver loop errors - these are harmless but noisy
			window.addEventListener("error", function (e) {
				if (e.message && e.message.includes("ResizeObserver")) {
					const resizeObserverLoopErrRe =
						/^[^(ResizeObserver loop limit exceeded)]/;
					if (resizeObserverLoopErrRe.test(e.message)) {
						e.stopImmediatePropagation();
						e.preventDefault();
					}
				}
			});

			// Additional suppression for unhandled errors
			const resizeObserverErrHandler = (e) => {
				if (
					e.message ===
						"ResizeObserver loop completed with undelivered notifications." ||
					e.message === "ResizeObserver loop limit exceeded" ||
					(e.message && e.message.includes("ResizeObserver"))
				) {
					e.stopImmediatePropagation();
					return true;
				}
			};

			window.addEventListener("error", resizeObserverErrHandler, true);
			window.addEventListener("unhandledrejection", function (e) {
				if (
					e.reason &&
					e.reason.message &&
					e.reason.message.includes("ResizeObserver")
				) {
					e.preventDefault();
				}
			});
		</script>
