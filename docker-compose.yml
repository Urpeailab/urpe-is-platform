services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Not exposed to host — only internal services connect via the docker network.

  portal:
    build: ./apps/portal
    ports:
      - "8001:8080"
    env_file:
      - .env
    environment:
      - APP_NAME=portal
    depends_on:
      - mongo
    restart: unless-stopped

  redactora:
    build: ./apps/redactora
    ports:
      - "8002:8080"
    env_file:
      - .env
    environment:
      - APP_NAME=redactora
    restart: unless-stopped

volumes:
  mongo_data:
